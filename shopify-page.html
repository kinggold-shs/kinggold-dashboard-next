<!-- KingGold Inventory Dashboard — paste this into Shopify Page HTML editor -->
<!-- Replace VERCEL_URL with your actual Vercel deployment URL -->

<style>
  .kg-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    background: #0a0a0a;
  }
  .kg-loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #d4a853;
    font-family: system-ui, sans-serif;
    font-size: 14px;
  }
  .kg-loader svg {
    animation: kg-spin 0.9s linear infinite;
  }
  @keyframes kg-spin {
    to { transform: rotate(360deg); }
  }
  .kg-frame {
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .kg-frame.loaded {
    opacity: 1;
  }
</style>

<div class="kg-wrap" id="kg-wrap">
  <div class="kg-loader" id="kg-loader">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
    <span>Loading KingGold Dashboard…</span>
  </div>
  <iframe
    id="kg-frame"
    class="kg-frame"
    src="VERCEL_URL"
    title="KingGold Inventory Dashboard"
    allow="clipboard-write; fullscreen"
  ></iframe>
</div>

<script>
  (function () {
    var frame = document.getElementById('kg-frame');
    var loader = document.getElementById('kg-loader');
    frame.addEventListener('load', function () {
      loader.style.display = 'none';
      frame.classList.add('loaded');
    });
  })();
</script>
